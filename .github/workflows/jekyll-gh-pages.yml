# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Build duck farm
        run: |
          cd duck-farm
          npm ci
          npm run build
          cd ..
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Prepare briefcase and duck farm site
        run: |
          # Create _site with briefcase at root
          if [ -d ./briefcase ]; then
            mkdir -p _site
            cp -r briefcase/* _site/
          else
            echo "briefcase folder not found" && exit 1
          fi

          # Legacy /briefcase/ bookmarks → root portfolio
          mkdir -p _site/briefcase
          cat > _site/briefcase/index.html <<'REDIRECT'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=../" />
            <link rel="canonical" href="https://jadexzhao.github.io/jadexzhao/" />
            <title>Redirecting…</title>
          </head>
          <body><p><a href="../">jade zhao · the briefcase</a></p></body>
          </html>
          REDIRECT
          
          # Copy duck farm dist to _site/duck-farm/
          if [ -d ./duck-farm/dist ]; then
            mkdir -p _site/duck-farm
            cp -r duck-farm/dist/* _site/duck-farm/
          else
            echo "duck-farm/dist folder not found" && exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
