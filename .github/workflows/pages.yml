# Composite GitHub Pages deploy for @jadexzhao
# briefcase HTML at site root + Vite duck-farm at /jadexzhao/duck-farm/
# Source in GitHub Settings: GitHub Actions (not branch/folder publish).
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "briefcase/**"
      - "duck-farm/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: duck-farm/package-lock.json

      - name: Build duck farm
        run: |
          cd duck-farm
          npm ci
          npm run build
          # Guard: Vite base must keep project-Pages subpath assets resolvable
          if ! grep -q '/jadexzhao/duck-farm/' dist/index.html; then
            echo "duck-farm dist missing base path /jadexzhao/duck-farm/" >&2
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare briefcase and duck farm site
        run: |
          if [ -d ./briefcase ]; then
            mkdir -p _site
            cp -r briefcase/* _site/
          else
            echo "briefcase folder not found" && exit 1
          fi

          # Actions artifact is served as-is; .nojekyll keeps branch-fallback safe
          touch _site/.nojekyll

          # Legacy /briefcase/ bookmarks → root portfolio
          mkdir -p _site/briefcase
          cat > _site/briefcase/index.html <<'REDIRECT'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=../" />
            <link rel="canonical" href="https://jadexzhao.github.io/jadexzhao/" />
            <title>Redirecting…</title>
          </head>
          <body><p><a href="../">jade zhao · the briefcase</a></p></body>
          </html>
          REDIRECT

          # Legacy demo deploys → briefcase (old demo folders removed Jul 2026)
          for legacy_path in scoping-review-dashboard clinical-data-pipeline; do
            mkdir -p "_site/${legacy_path}"
            cat > "_site/${legacy_path}/index.html" <<REDIRECT
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=../" />
            <link rel="canonical" href="https://jadexzhao.github.io/jadexzhao/" />
            <title>Redirecting…</title>
          </head>
          <body><p><a href="../">jade zhao · the briefcase</a></p></body>
          </html>
          REDIRECT
          done

          # Nested Vite app under duck-farm/ (does not clobber briefcase root)
          if [ -d ./duck-farm/dist ]; then
            mkdir -p _site/duck-farm
            cp -r duck-farm/dist/* _site/duck-farm/
          else
            echo "duck-farm/dist folder not found" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
